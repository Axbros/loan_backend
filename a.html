<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1,maximum-scale=1, user-scalable=no">
    <title>详情页</title>
    <link rel="stylesheet" type="text/css" href="https://port.mr.mct.gov.cn/css/mobile/reset.css" media="all" />

<body>
<div class="main-wrapper">
    <ul class="menu-tab">
        <li class="active" data-content="baseInfo">基本信息</li>
        <li data-content="itineraryList">行程单</li>
        <li data-content="touristList">游客名单</li>
    </ul>
    <div class="clear-1"></div>
    <div class="tab-content">
        <div class="detail-wrapper content-wrapper" id="baseInfo"></div>
        <div class="itinerary-list content-wrapper" id="itineraryList">
            <div class="flowChart">
                <div class="flowChart-left"><div class="dashed"></div></div>
                <div class="flowChart-right"></div>
            </div>
        </div>
        <div class="tourist-list content-wrapper" id="touristList"></div>
    </div>
</div>

<script type="text/html" id="itineraryInfoTpl">
    <%
    var transitName = '出境';
    if(businessType == 2 || businessType == 6 || businessType == 7) {
        transitName = '出省';
    }
    %>
    <%
    for(var i=0; i<itineraryList.length; i++) {
        for(var j=0; j<itineraryList[i].sites.length; j++) {
    %>
    <div class="oneNode">
        <div class="check <%=j==0 ? 'check-success' : ''%>"></div>
        <div class="NodeDetail">
            <div class="NodeDetail-title">
                <span class="date"><%=dateAdd(exitDate,i)%></span>
                <span class="area"><%=itineraryList[i].sites[j].arrival_country_name%>/<%=itineraryList[i].sites[j].arrival_city_name%></span>
            </div>
            <div class="NodeDetail-content">
                <%=itineraryList[i].sites[j].detail%>
            </div>
            <div class="NodeDetail-footer">
                <span>第<%=j+1%>站 <%=itineraryList[i].sites[j].is_transit ? '（'+transitName+'）' : ''%></span>
            </div>
        </div>
    </div>
    <%
        }
    }
    %>
</script>

<script type="text/html" id="touristListTpl">
    <h5>共<em><%=tourists.length%></em>人，其中 男<em><%=maleCount%></em>人，女<em><%=femaleCount%></em>人</h5>
    <ul>
        <%
        for(var i=0; i<tourists.length; i++) {
        %>
        <li>
            <div class="name"><%=tourists[i].fullname%></div>
            <div class="gender"><%=getGenderName(tourists[i].gender)%></div>
            <div class="card"><%=tourists[i].cardNumber%></div>
        </li>
        <%
        }
        %>
    </ul>
</script>

// 日期格式化
function formatDateTime(date, fmt) {
    if (!date || date === 'null' || date === '0000-00-00') return '';
    date = new Date(date);
    var o = {
        "M+": date.getMonth() + 1,
        "d+": date.getDate(),
        "h+": date.getHours(),
        "m+": date.getMinutes(),
        "s+": date.getSeconds()
    };
    if (/(y+)/.test(fmt)) {
        fmt = fmt.replace(RegExp.$1, (date.getFullYear() + "").substr(4 - RegExp.$1.length));
    }
    for (var k in o) {
        if (new RegExp("(" + k + ")").test(fmt)) {
            fmt = fmt.replace(RegExp.$1,
                RegExp.$1.length === 1 ? o[k] : ("00" + o[k]).substr(("" + o[k]).length));
        }
    }
    return fmt === 'NaN/aN/aN' ? '' : fmt;
}

template.helper('formatDateTime', function (date, fmt) {
    return formatDateTime(date, fmt);
});

template.helper('dateAdd', function (dd, dadd) {
    if (!dd || dd === 'null') return '';
    var a = new Date(dd);
    a = a.valueOf() + dadd * 86400000;
    a = new Date(a);
    var y = a.getFullYear();
    var m = (a.getMonth() + 1 < 10 ? '0' : '') + (a.getMonth() + 1);
    var d = (a.getDate() < 10 ? '0' : '') + a.getDate();
    return y + '/' + m + '/' + d;
});

template.helper('getGenderName', function (gender) {
    if (gender == 0) return '<em class="blue">男</em>';
    if (gender == 1) return '<em class="red">女</em>';
    return '';
});

// 切换 tab
$('.menu-tab li').on('click', function () {
    $('.menu-tab li').removeClass('active');
    $(this).addClass('active');
    $('.content-wrapper').hide();
    $('#' + $(this).data('content')).show();
});

// 直接用 mock 数据渲染
$(function () {
    var data = MOCK_DATA.data;

    // 解析行程
    for (var i in data.tourItineraries) {
        data.tourItineraries[i].sites = JSON.parse(data.tourItineraries[i].sitesString);
    }
    data.itineraryList = data.tourItineraries;

    // 统计男女
    data.maleCount = 0;
    data.femaleCount = 0;
    data.tourists.forEach(function (item) {
        item.gender == 0 ? data.maleCount++ : data.femaleCount++;
    });

    // 渲染三个模板
    $('#baseInfo').html(template('baseInfoTpl', data));
    $('.flowChart-right').html(template('itineraryInfoTpl', data));
    $('#touristList').html(template('touristListTpl', data));
});
